name: CLI

on:
  push:
    branches: ["main"]
  release:
    types: ["created"]
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

jobs:
  cli-tests:
    runs-on: ${{ matrix.os }}
    if: github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-22.04", "macos-14"]  # todo: add "windows-2022"
        python-version: ["3.8", "3.10"]
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v2
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip' # caching pip dependencies

    - name: Install dependencies
      run: |
        pip install -r tests/requirements.txt ${{ matrix.extra-installs }}
        pip install . --upgrade
        pip list
      shell: bash

    - name: Tests
      run: |
        # NOTE: do not include coverage report here, see: https://github.com/nedbat/coveragepy/issues/1003
        coverage run --source lightning_sdk -m pytest cli/ -vv -s
      env: # the following values are just dummies since the actual http calls are mocked out
        LIGHTNING_USER_ID: ${{ secrets.LIGHTNING_USER_ID }}
        LIGHTNING_API_KEY: ${{ secrets.LIGHTNING_API_KEY }}
      working-directory: tests
    - name: Statistics
      working-directory: tests
      continue-on-error: true
      run: |
        coverage report
        coverage xml

  guardian-CLI:
    runs-on: ubuntu-latest
    needs: cli-tests
    if: always()
    steps:
    - run: echo "${{ needs.cli-tests.result }}"
    - name: failing...
      if: needs.cli-tests.result == 'failure'
      run: exit 1
    - name: cancelled or skipped...
      if: contains(fromJSON('["cancelled", "skipped"]'), needs.cli-tests.result)
      timeout-minutes: 1
      run: sleep 90
