name: CLI

on:
  push:
    branches: ["main"]
  release:
    types: ["created"]
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

defaults:
  run:
    shell: bash

jobs:
  cli-tests:
    runs-on: ${{ matrix.os }}
    if: github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-22.04", "macos-14"]  # todo: add "windows-2022"
        python-version: ["3.12"]
        install-extras: ["", "serve"]
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip' # caching pip dependencies

    - name: Install package and test dependencies
      run: pip install . --upgrade -r tests/requirements.txt

    - name: Re-Install dependencies with `${{ matrix.install-extras }}`
      if: ${{ matrix.install-extras != '' }}
      run: pip install '.[${{ matrix.install-extras }}]' --upgrade -r tests/requirements.txt

    - name: show pip list
      run: pip list

    - name: Tests
      working-directory: tests
      env: # the following values are just dummies since the actual http calls are mocked out
        LIGHTNING_USER_ID: ${{ secrets.LIGHTNING_USER_ID }}
        LIGHTNING_API_KEY: ${{ secrets.LIGHTNING_API_KEY }}
      run: |
        # NOTE: do not include coverage report here, see: https://github.com/nedbat/coveragepy/issues/1003
        coverage run --source lightning_sdk -m pytest cli/ -vv -s
    - name: Statistics
      working-directory: tests
      continue-on-error: true
      run: |
        coverage report
        coverage xml

  guardian-CLI:
    runs-on: ubuntu-latest
    needs: cli-tests
    if: always()
    steps:
    - run: echo "${{ needs.cli-tests.result }}"
    - name: failing...
      if: needs.cli-tests.result == 'failure'
      run: exit 1
    - name: cancelled or skipped...
      if: contains(fromJSON('["cancelled", "skipped"]'), needs.cli-tests.result)
      timeout-minutes: 1
      run: sleep 90
