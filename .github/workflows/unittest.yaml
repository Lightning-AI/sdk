name: UnitTest

on:
  push:
    branches:
      - "main"
  release:
    types:
      - created
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
jobs:

  cpu:
    runs-on: "ubuntu-22.04"
    if: github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10"]
        extra-installs: ["", "lightning[app]"]

    timeout-minutes: 40

    steps:
    - uses: actions/checkout@v2
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip' # caching pip dependencies

    - name: Install dependencies
      run: |
        pip install -r tests/requirements.txt ${{ matrix.extra-installs }}
        pip install . --upgrade
        pip list
      shell: bash

    - name: Tests
      run: |
        # NOTE: do not include coverage report here, see: https://github.com/nedbat/coveragepy/issues/1003
        coverage run --source lightning_sdk -m pytest tests --junitxml=junit/test-results-${{ runner.os }}-py${{ matrix.python-version }}.xml -vv -s
      env: # the following values are just dummies since the actual http calls are mocked out
        LIGHTNING_USER_ID: ${{ secrets.LIGHTNING_USER_ID }}
        LIGHTNING_API_KEY: ${{ secrets.LIGHTNING_API_KEY }}
    - name: Statistics
      run: |
        coverage report
        coverage xml

  guardian-unittest:
    runs-on: ubuntu-latest
    needs: cpu
    if: always()
    steps:
    - run: echo "${{ needs.cpu.result }}"
    - name: failing...
      if: needs.cpu.result == 'failure'
      run: exit 1
    - name: cancelled or skipped...
      if: contains(fromJSON('["cancelled", "skipped"]'), needs.cpu.result)
      timeout-minutes: 1
      run: sleep 90
