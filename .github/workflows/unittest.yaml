name: UnitTest

on:
  push:
    branches: ["main"]
  release:
    types: ["created"]
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

defaults:
  run:
    shell: bash

jobs:
  cpu-unittests:
    runs-on: "ubuntu-22.04"
    if: github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    timeout-minutes: 40
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip' # caching pip dependencies

    - name: Install dependencies
      run: |
        pip install -r python/tests/requirements.txt ${{ matrix.extra-installs }}
        pip install "./python[serve]" --upgrade
        pip list

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.BYOC_SANDBOX_AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.BYOC_SANDBOX_AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Tests w/o CLI
      working-directory: python/tests
      run: |
        # NOTE: do not include coverage report here, see: https://github.com/nedbat/coveragepy/issues/1003
        coverage run -m pytest . -vv -s --ignore=cli
      env: # the following values are just dummies since the actual http calls are mocked out
        LIGHTNING_USER_ID: ${{ secrets.LIGHTNING_USER_ID }}
        LIGHTNING_API_KEY: ${{ secrets.LIGHTNING_API_KEY }}

    - name: Statistics
      continue-on-error: true
      working-directory: python/tests
      run: |
        coverage report
        coverage xml

  js-unittests:
    runs-on: "ubuntu-22.04"
    if: github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22"]
    timeout-minutes: 40
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: js/package-lock.json
    - name: Install dependencies
      working-directory: js
      run: npm ci
    - name: Run tests
      working-directory: js
      run: npm test

  guardian-unittest:
    runs-on: ubuntu-latest
    needs: [cpu-unittests, js-unittests]
    if: always()
    steps:
    - run: |
        echo "cpu-unittests: ${{ needs.cpu-unittests.result }}"
        echo "js-unittests: ${{ needs.js-unittests.result }}"
    - name: failing...
      if: needs.cpu-unittests.result == 'failure' || needs.js-unittests.result == 'failure'
      run: exit 1
    - name: cancelled or skipped...
      if: |
        contains(fromJSON('["cancelled", "skipped"]'), needs.cpu-unittests.result) ||
        contains(fromJSON('["cancelled", "skipped"]'), needs.js-unittests.result)
      timeout-minutes: 1
      run: sleep 90
