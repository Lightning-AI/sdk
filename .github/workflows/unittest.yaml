name: UnitTest

on:
  push:
    branches: ["main"]
  release:
    types: ["created"]
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

jobs:
  cpu-unittests:
    runs-on: "ubuntu-22.04"
    if: github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10"]
        extra-installs: ["", "lightning[app]"]
    timeout-minutes: 40
    steps:
    - uses: actions/checkout@v2
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip' # caching pip dependencies

    - name: Install dependencies
      run: |
        pip install -r tests/requirements.txt ${{ matrix.extra-installs }}
        pip install . --upgrade
        pip list
      shell: bash

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.BYOC_SANDBOX_AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.BYOC_SANDBOX_AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Tests
      run: |
        # NOTE: do not include coverage report here, see: https://github.com/nedbat/coveragepy/issues/1003
        coverage run --source lightning_sdk -m pytest api/ core/ services/ -vv -s
      env: # the following values are just dummies since the actual http calls are mocked out
        LIGHTNING_USER_ID: ${{ secrets.LIGHTNING_USER_ID }}
        LIGHTNING_API_KEY: ${{ secrets.LIGHTNING_API_KEY }}
      working-directory: tests
    - name: Statistics
      working-directory: tests
      continue-on-error: true
      run: |
        coverage report
        coverage xml

  guardian-unittest:
    runs-on: ubuntu-latest
    needs: cpu-unittests
    if: always()
    steps:
    - run: echo "${{ needs.cpu-unittests.result }}"
    - name: failing...
      if: needs.cpu-unittests.result == 'failure'
      run: exit 1
    - name: cancelled or skipped...
      if: contains(fromJSON('["cancelled", "skipped"]'), needs.cpu-unittests.result)
      timeout-minutes: 1
      run: sleep 90
