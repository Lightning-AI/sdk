# Publishes @lightningai/sdk to https://www.npmjs.com/ when a version tag is pushed or a GitHub Release is published.
# Same trigger pattern as PyPI Release (.github/workflows/release.yaml). Both
# packages derive their versions from the same Git tag and repository state.

name: npm Release

on:
  push:
    branches: [main, "release/*"]
  release:
    types: [published]

jobs:
  build-package:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: js/package-lock.json

      - name: Install and build
        working-directory: js
        run: |
          npm ci
          npm run build
          if [ "$GITHUB_EVENT_NAME" = "release" ]; then
            npm run pack:scm -- --release --output package
          else
            npm run pack:scm -- --output package
          fi

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: npm-packages-${{ github.sha }}
          path: js/package/*.tgz

  upload-package:
    needs: build-package
    if: startsWith(github.event.ref, 'refs/tags') || github.event_name == 'release'
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: npm-packages-${{ github.sha }}
          path: package

      - run: ls -lh package/

      - name: Upload to release
        uses: AButler/upload-release-assets@3d6774fae0ed91407dc5ae29d576b166536d1777 # v3.0
        with:
          files: "package/*.tgz"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  publish-package:
    needs: build-package
    if: startsWith(github.event.ref, 'refs/tags') || github.event_name == 'release'
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: npm-packages-${{ github.sha }}
          path: package

      - run: ls -lh package/

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      # Publish the exact tarball produced and tested by build-package.
      - name: Publish distribution to npm
        run: npm publish package/*.tgz --access public --ignore-scripts --tag latest
