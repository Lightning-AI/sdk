# Publishes @lightningai/sdk to https://www.npmjs.com/ when a version tag is pushed or a GitHub Release is published.
# Same trigger pattern as PyPI Release (.github/workflows/release.yaml). Both
# packages derive their versions from the same Git tag and repository state.

name: npm Release

on:
  push:
    branches: [main, "release/*"]
  release:
    types: [published]

jobs:
  build-package:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: js/package-lock.json

      - name: Install and build
        working-directory: js
        run: |
          npm ci
          npm run build
          if [ "$GITHUB_EVENT_NAME" = "release" ]; then
            npm run pack:scm -- --release --output package
          else
            npm run pack:scm -- --output package
          fi

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-packages-${{ github.sha }}
          path: js/package/*.tgz

  upload-package:
    needs: build-package
    if: startsWith(github.event.ref, 'refs/tags') || github.event_name == 'release'
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-packages-${{ github.sha }}
          path: package

      - run: ls -lh package/

      - name: Upload to release
        uses: AButler/upload-release-assets@3d6774fae0ed91407dc5ae29d576b166536d1777 # v3.0
        with:
          files: "package/*.tgz"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  publish-package:
    needs: build-package
    if: startsWith(github.event.ref, 'refs/tags') || github.event_name == 'release'
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-packages-${{ github.sha }}
          path: package

      - run: ls -lh package/

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      # Publish the exact tarball produced and tested by build-package.
      # Skip if this exact version is already on the registry so re-runs stay green instead of
      # failing with "cannot publish over the previously published versions".
      - name: Publish distribution to npm
        run: |
          set -euo pipefail
          TARBALL=$(echo package/*.tgz)
          read -r NAME VER < <(
            tar -xOf "$TARBALL" package/package.json |
              node -e 'let input = ""; process.stdin.on("data", chunk => input += chunk); process.stdin.on("end", () => { const pkg = JSON.parse(input); console.log(pkg.name, pkg.version); });'
          )
          if [ -n "$(npm view "${NAME}@${VER}" version 2>/dev/null || true)" ]; then
            echo "${NAME}@${VER} already published; skipping."
            exit 0
          fi
          npm publish "$TARBALL" --access public --ignore-scripts --tag latest
