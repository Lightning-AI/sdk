# Publishes @lightningai/sdk to https://www.npmjs.com/ when a version tag is pushed or a GitHub Release is published.
# Same trigger pattern as PyPI Release (.github/workflows/release.yaml).
#
# --- Version alignment (Python ↔ npm) ---
# • Canonical version string: python/lightning_sdk/__version__.py → __version__
# • PyPI reads that via setuptools dynamic metadata (see pyproject.toml).
# • Before "npm ci", this workflow runs `npm version <that string>` in js/ so the published
#   tarball matches PyPI for the same git commit. Committers may still bump js/package.json
#   manually after changing __version__.py to avoid noisy diffs; CI corrects it if they forget.

name: npm Release

on:
  push:
    branches: [main, "release/*"]
  release:
    types: [published]

jobs:
  build-package:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Overwrites js/package.json + package-lock.json "version" fields only (no git tag).
      # On a release the git tag is authoritative (strip a leading "v"); otherwise fall
      # back to the canonical Python version. Keeps the npm tarball aligned with PyPI.
      # Uses --allow-same-version so jobs stay green when the repo is already in sync.
      - name: Sync npm version
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            VER="${GITHUB_REF_NAME#v}"
          else
            VER=$(grep -E '^__version__ = ' python/lightning_sdk/__version__.py | sed -E 's/^__version__ = "([^"]+)".*/\1/')
          fi
          # PyPI/PEP440 post-releases look like "2026.7.7.post1", which is NOT valid
          # semver. Feeding that straight to `npm version` makes node-semver's loose
          # parser silently mangle it (e.g. the zero-padded tag "2026.07.07.post1"
          # became "2026.7.0-7.post1" on npm). Map the ".postN" suffix to this
          # project's npm convention "-postN" (e.g. 2026.6.8-post0); `npm version`
          # then normalizes the zero-padded CalVer core (2026.07.07 -> 2026.7.7).
          NPM_VER="${VER/.post/-post}"
          echo "Using version ${VER} (npm: ${NPM_VER})"
          (cd js && npm version "$NPM_VER" --no-git-tag-version --allow-same-version)

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: js/package-lock.json

      - name: Install and build
        working-directory: js
        run: |
          npm ci
          npm run build
          rm -rf node_modules

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-packages-${{ github.sha }}
          path: js

  upload-package:
    needs: build-package
    if: startsWith(github.event.ref, 'refs/tags') || github.event_name == 'release'
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-packages-${{ github.sha }}
          path: package

      - run: ls -lh package/

      - name: Pack tarball for release assets
        working-directory: package
        run: npm pack

      - name: Upload to release
        uses: AButler/upload-release-assets@3d6774fae0ed91407dc5ae29d576b166536d1777 # v3.0
        with:
          files: "package/*.tgz"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  publish-package:
    needs: build-package
    if: startsWith(github.event.ref, 'refs/tags') || github.event_name == 'release'
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-packages-${{ github.sha }}
          path: package

      - run: ls -lh package/

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      # Artifact was built in build-package; prepublishOnly would run `npm run clean` and wipe dist/.
      # node_modules are absent here, so --ignore-scripts skips lifecycle hooks and publishes as-is.
      # Skip if this exact version is already on the registry so re-runs stay green instead of
      # failing with "cannot publish over the previously published versions".
      - name: Publish distribution to npm
        working-directory: package
        run: |
          set -euo pipefail
          NAME=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if [ -n "$(npm view "${NAME}@${VER}" version 2>/dev/null || true)" ]; then
            echo "${NAME}@${VER} already published; skipping."
            exit 0
          fi
          npm publish --access public --ignore-scripts --tag latest
