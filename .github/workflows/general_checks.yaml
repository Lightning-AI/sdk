name: General checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref }}
  cancel-in-progress: ${{ ! (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release/')) }}

jobs:
  check-code:
    uses: Lightning-AI/utilities/.github/workflows/check-code.yml@v0.9.0
    with:
      actions-ref: main
      extra-typing: typing

  check-schema:
    uses: Lightning-AI/utilities/.github/workflows/check-schema.yml@v0.9.0

  check-package:
    if: github.event.pull_request.draft == false
    uses: Lightning-AI/utilities/.github/workflows/check-package.yml@v0.9.0
    with:
      actions-ref: main
      artifact-name: dist-packages-${{ github.sha }}
      import-name: "lightning_sdk"
      testing-matrix: |
        {
          "os": ["ubuntu-20.04"],
          "python-version": ["3.8", "3.9", "3.10", "3.11"]
        }