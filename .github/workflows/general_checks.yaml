name: General checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref }}
  cancel-in-progress: ${{ ! (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release/')) }}

jobs:
  check-code:
    id: check_code
    uses: Lightning-AI/utilities/.github/workflows/check-code.yml@v0.9.0
    with:
      actions-ref: main
      extra-typing: typing

  check-schema:
    id: check_schema
    uses: Lightning-AI/utilities/.github/workflows/check-schema.yml@v0.9.0

  check-package:
    id: check_package
    if: github.event.pull_request.draft == false
    uses: Lightning-AI/utilities/.github/workflows/check-package.yml@v0.9.0
    with:
      actions-ref: main
      artifact-name: dist-packages-${{ github.sha }}
      import-name: "lightning_sdk"
      testing-matrix: |
        {
          "os": ["ubuntu-20.04"],
          "python-version": ["3.8", "3.9", "3.10", "3.11"]
        }

  guardian-checks:
    runs-on: ubuntu-latest
    needs: [check_code, check_schema, check_package]
    if: always()
    steps:
    - run: echo "${{ needs.check_code.result }}, ${{ needs.check_schema.result }}, ${{ needs.check_package.result }}"
    - name: failing...
      if: needs.check_code.result == 'failure' || 
      run: exit 1
    - name: cancelled or skipped...
      if: contains(fromJSON('["cancelled", "skipped"]'), needs.check_code.result)
      timeout-minutes: 1
      run: sleep 90