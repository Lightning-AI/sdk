name: General checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, reopened, ready_for_review, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref }}
  cancel-in-progress: ${{ ! (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release/')) }}

jobs:
  check-schema:
    uses: Lightning-AI/utilities/.github/workflows/check-schema.yml@c89c402603f4f267525f17dc2850ec53e0e48a9a # main
    with:
      azure-dir: ''

  check-package:
    if: github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    env:
      LIGHTNING_USER_ID: dummy-user-id
      LIGHTNING_API_KEY: dummy-api-key
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0
    - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
    - name: Build wheel and smoke-install
      run: |
        cd python
        pip install build twine
        python -m build
        twine check dist/*
        pip install dist/*.whl
        python -c "import lightning_sdk; from lightning_sdk.llm.public_assistants import PUBLIC_MODELS; assert len(PUBLIC_MODELS.keys())"

  pkg-guardian:
    runs-on: ubuntu-latest
    needs: check-package
    if: always() && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    steps:
      - run: echo "${{ needs.check-package.result }}"
      - name: failing...
        if: needs.check-package.result == 'failure'
        run: exit 1
      - name: cancelled or skipped...
        if: contains(fromJSON('["cancelled", "skipped"]'), needs.check-package.result)
        timeout-minutes: 1
        run: sleep 90

  pre-commit:
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout 🛎️
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Set up Python 🐍
      uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
      with:
        python-version: "3.11"

    - name: Set up Go
      uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
      with:
        go-version: "1.24.x"

    - name: Install Go pre-commit tools
      run: |
        curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/v2.12.2/install.sh | sh -s -- -b "$(go env GOPATH)/bin" v2.12.2
        echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

    - name: Determine cache hash
      run: echo "PY=$(python -VV | sha256sum | cut -d' ' -f1)" >> $GITHUB_ENV

    - name: Cache 💽 pre-commit
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/.cache/pre-commit
        key: pre-commit|${{ env.PY }}|${{ hashFiles('.pre-commit-config.yaml', 'python/pyproject.toml') }}

    - name: Run pre-commit
      uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
